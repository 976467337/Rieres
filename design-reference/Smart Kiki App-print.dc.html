<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>doc-page:not(:defined){visibility:hidden}</style>
  <x-import component-from-global-scope="doc-page" from="./doc-page.js" hint-size="100%,100%"></x-import>
</helmet>

<doc-page size="letter" orientation="portrait" margin="0.4in">
  <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:#1A1F24;margin-bottom:4px;">Smart Kiki — Protótipo (Aqua Tech)</div>
  <div style="font-family:'Inter',sans-serif;font-size:12px;color:#5B6570;margin-bottom:16px;">Direção visual 1a — telas do cliente e do personal.</div>
  <div style="display:flex;justify-content:center;">
    <dc-import name="PhoneApp" variant="a" hint-size="412,892"></dc-import>
  </div>

  <div style="break-before:page;"></div>

  <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:#1A1F24;margin-bottom:4px;">Smart Kiki — Protótipo (Lime Bold)</div>
  <div style="font-family:'Inter',sans-serif;font-size:12px;color:#5B6570;margin-bottom:16px;">Direção visual 1b — telas do cliente e do personal.</div>
  <div style="display:flex;justify-content:center;">
    <dc-import name="PhoneApp" variant="b" hint-size="412,892"></dc-import>
  </div>
</doc-page>

</x-dc>
<script type="text/x-dc" data-dc-script>

class Component extends DCLogic {
  componentDidMount() {
    (async () => {
      try { await document.fonts.ready; } catch (e) {}
      const imgs = Array.from(document.images).filter((i) => !i.complete);
      await Promise.race([
        Promise.allSettled(imgs.map((i) => i.decode ? i.decode().catch(() => {}) : Promise.resolve())),
        new Promise((r) => setTimeout(r, 8000)),
      ]);
      setTimeout(() => window.print(), 800);
    })();
  }
}

</script>
</body>
</html>
